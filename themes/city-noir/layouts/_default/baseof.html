<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} &mdash; {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
</head>
<body>

  {{ partial "header.html" . }}

  <div class="drawer-overlay" id="overlay"></div>
  {{ partial "nav-drawer.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <footer>
    &copy; The City &mdash; A Chronicle of the World of Darkness
  </footer>

  <script src="{{ "js/menu.js" | relURL }}"></script>
</body>
</html>
