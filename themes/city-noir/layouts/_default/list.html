{{ define "main" }}
<section class="list-page">
  <h1 class="page-title">{{ .Title }}</h1>
  <ul class="entry-list">
    {{ range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ if .Date }}<span class="entry-date">{{ .Date.Format "January 2, 2006" }}</span>{{ end }}
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
